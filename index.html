<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משה מדינה - הקישורים שלי</title>
    <!-- פונט מודרני -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- אייקונים לרשתות חברתיות -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4F46E5; 
            --primary-hover: #4338CA;
            --text-dark: #1F2937;
            --text-light: #4B5563;
            --accent: #F59E0B; 
            --accent-hover: #D97706;
            --bg-color: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px; /* רוחב מושלם למובייל */
            padding: 40px 20px;
            text-align: center;
        }

        /* תמונת פרופיל */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .bio {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* כפתורים משותפים */
        .link-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background-color: #ffffff;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid #E5E7EB;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            border-color: #D1D5DB;
        }

        /* הכפתור הראשי (רכישת הספר) מודגש במיוחד */
        .main-btn {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            font-size: 1.2rem;
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.4);
            animation: pulse 2s infinite;
        }

        .main-btn:hover {
            background-color: var(--accent-hover);
            color: #ffffff;
            border: none;
        }

        /* אנימציה עדינה לכפתור הראשי למשוך תשומת לב */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* שורת אייקונים לרשתות חברתיות */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .social-icon {
            color: var(--text-light);
            font-size: 1.8rem;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- החלף את הקישור לתמונה שלך -->
        <img src="URL_TO_YOUR_PROFILE_PICTURE" alt="משה מדינה" class="profile-img">
        
        <h1>משה מדינה</h1>
        <div class="bio">מספר סיפורים ומדריך לצמיחה אישית.<br>עוזר לילדים ומבוגרים לגלות את הקסם שבהם.</div>

        <!-- כפתור רכישה ראשי ומודגש -->
        <a href="URL_TO_YOUR_SALES_PAGE" class="link-btn main-btn">
            📚 לרכישת רב-המכר "קסם וקשב"
        </a>

        <!-- כפתורי שירותים וקהילה -->
        <a href="LINK_TO_WHATSAPP_GROUP" class="link-btn">
            💬 הצטרפו לקהילת הוואטסאפ שלנו
        </a>

        <a href="LINK_TO_WHATSAPP_FOR_COACHING" class="link-btn">
            🤝 ליווי אישי ואימון קשב (לתיאום בהודעה)
        </a>

        <a href="LINK_TO_YOUTUBE_COURSES" class="link-btn">
            🎓 הקורסים הדיגיטליים שלי ביוטיוב
        </a>

        <!-- רשתות חברתיות -->
        <div class="social-icons">
            <a href="LINK_TO_TIKTOK" class="social-icon" title="טיקטוק"><i class="fa-brands fa-tiktok"></i></a>
            <a href="LINK_TO_INSTAGRAM" class="social-icon" title="אינסטגרם"><i class="fa-brands fa-instagram"></i></a>
            <a href="LINK_TO_FACEBOOK" class="social-icon" title="פייסבוק"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="LINK_TO_YOUTUBE" class="social-icon" title="יוטיוב"><i class="fa-brands fa-youtube"></i></a>
        </div>

    </div>

</body>
</html>
